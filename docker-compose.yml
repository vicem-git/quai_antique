services:
  backend:
    build: ./backend
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - NODE_ENV=production
      - DB_PATH=/app/data/database.sqlite
    volumes:
      - quai_db:/app/data
      - quai_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3003:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  quai_db:
  quai_uploads:
